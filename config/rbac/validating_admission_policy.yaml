apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: secondary-resource-protection
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: ["apps"]
      apiVersions: ["v1"]
      operations: ["UPDATE", "DELETE"]
      resources: ["statefulsets"]
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["UPDATE", "DELETE"]
      resources: ["services", "configmaps"]
  matchConditions:
  - name: is-etcd-operator-managed-resource
    expression: |
      has(object.metadata.ownerReferences) &&
      object.metadata.ownerReferences.exists(owner,
        owner.apiVersion == "operator.etcd.io/v1alpha1" &&
        owner.kind == "EtcdCluster" &&
        has(owner.controller) &&
        owner.controller == true
      )
  validations:
  - expression: |
      request.userInfo.username == "system:serviceaccount:system:controller-manager"
    messageExpression: |
      "Access denied: Only the etcd-operator service account can modify or delete this " +
      object.kind + " resource '" + object.metadata.name + "'. " +
      "This resource is managed by the etcd-operator (owned by EtcdCluster '" +
      object.metadata.ownerReferences.filter(owner, owner.apiVersion == "operator.etcd.io/v1alpha1")[0].name +
      "') and should not be modified directly."
    reason: Forbidden

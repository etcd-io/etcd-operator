---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: etcdbackups.operator.etcd.io
spec:
  group: operator.etcd.io
  names:
    kind: EtcdBackup
    listKind: EtcdBackupList
    plural: etcdbackups
    singular: etcdbackup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef
      name: Cluster
      type: string
    - jsonPath: .spec.destination.provider
      name: Provider
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.snapshotLocation
      name: Location
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          EtcdBackup is the Schema for the etcdbackups API. It represents a single
          point-in-time snapshot of an EtcdCluster uploaded to object storage.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EtcdBackupSpec defines the desired state of an EtcdBackup.
            properties:
              clusterRef:
                description: |-
                  ClusterRef references the EtcdCluster to snapshot. The cluster must live
                  in the same namespace as this EtcdBackup.
                minLength: 1
                type: string
              destination:
                description: Destination describes the object-storage target for the
                  snapshot.
                properties:
                  gcs:
                    description: |-
                      GCS holds GCS-specific destination configuration. Required when
                      Provider is "gcs".
                    properties:
                      bucket:
                        description: Bucket is the destination GCS bucket name.
                        minLength: 1
                        type: string
                    required:
                    - bucket
                    type: object
                  prefix:
                    description: |-
                      Prefix is an optional key prefix (a.k.a. "folder") within the bucket
                      under which the snapshot object is written. A trailing slash is optional.
                    type: string
                  provider:
                    description: Provider selects the object-storage backend.
                    enum:
                    - s3
                    - gcs
                    type: string
                  s3:
                    description: |-
                      S3 holds S3-specific destination configuration. Required when
                      Provider is "s3".
                    properties:
                      bucket:
                        description: Bucket is the destination S3 bucket name.
                        minLength: 1
                        type: string
                      endpoint:
                        description: |-
                          Endpoint overrides the S3 endpoint, enabling S3-compatible stores such
                          as MinIO or Ceph RGW. If empty, the default AWS endpoint for the region
                          is used.
                        type: string
                      forcePathStyle:
                        description: |-
                          ForcePathStyle forces path-style addressing (bucket in the path rather
                          than the host). Required by most S3-compatible stores.
                        type: boolean
                      region:
                        description: Region is the AWS region the bucket resides in
                          (e.g. "us-east-1").
                        type: string
                    required:
                    - bucket
                    type: object
                  secretRef:
                    description: |-
                      SecretRef references a Secret in the EtcdBackup's namespace holding the
                      credentials for the provider. The expected keys depend on the provider:
                        - s3:  accessKeyID / secretAccessKey (and optionally sessionToken)
                        - gcs: serviceAccountJSON (a GCP service-account key)
                      If unset, the controller falls back to ambient credentials available to
                      the operator pod (e.g. IRSA / Workload Identity), which is the
                      recommended production posture.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                required:
                - provider
                type: object
              retention:
                description: |-
                  Retention, when set, asks the controller to delete older snapshots under
                  the same bucket/prefix once more than RetainCount snapshots exist. A
                  value of 0 (the default) disables retention pruning.
                properties:
                  retainCount:
                    description: |-
                      RetainCount is the number of most-recent snapshots to keep under the
                      destination bucket/prefix. Older snapshots are deleted after a
                      successful upload. Zero disables pruning.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              snapshotTimeout:
                description: |-
                  SnapshotTimeout bounds how long the snapshot-save step may run before it
                  is considered failed. Defaults to 10m if unset.
                type: string
            required:
            - clusterRef
            - destination
            type: object
          status:
            description: EtcdBackupStatus defines the observed state of an EtcdBackup.
            properties:
              completionTime:
                description: CompletionTime is when the snapshot finished uploading
                  successfully.
                format: date-time
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the backup's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: Phase is a high-level summary of the backup lifecycle.
                type: string
              snapshotLocation:
                description: |-
                  SnapshotLocation is the fully-qualified URI of the uploaded snapshot
                  (e.g. "s3://my-bucket/etcd/backup-...db" or "gs://my-bucket/...").
                type: string
              snapshotSizeBytes:
                description: SnapshotSizeBytes is the size of the uploaded snapshot
                  in bytes.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
